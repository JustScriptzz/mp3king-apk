name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mp3king-apk
        uses: actions/checkout@v4

      - name: Checkout mp3king (site source)
        uses: actions/checkout@v4
        with:
          repository: JustScriptzz/mp3king
          token: ${{ secrets.GITHUB_TOKEN }}
          path: mp3king-site

      - name: Copy site files into www/
        run: |
          set -e
          mkdir -p www/assets

          # Main app HTML → app.html (index.html is our animated splash)
          cp mp3king-site/index.html www/app.html

          # All assets (JS, CSS, widget, etc.) — skip backup versions (*-v*.js)
          for f in mp3king-site/assets/*; do
            fname=$(basename "$f")
            # skip backup versions like index-BfX2ikgF-v10.js
            if echo "$fname" | grep -qE '\-v[0-9]+\.js$'; then
              continue
            fi
            cp "$f" "www/assets/$fname"
            echo "  copied: $fname"
          done

          # Static extras
          cp mp3king-site/placeholder.svg www/placeholder.svg
          cp mp3king-site/logo.jpeg      www/logo.jpeg
          cp mp3king-site/manifest.json  www/manifest.json

          # Rewrite asset paths in app.html: /assets/ → assets/ (relative)
          sed -i 's|="/assets/|="assets/|g' www/app.html

          echo "--- www/ contents ---"
          ls -lh www/ www/assets/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install deps
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode google-services.json (if present)
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mp3king-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
