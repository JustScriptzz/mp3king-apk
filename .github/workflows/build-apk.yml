name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install deps
        run: npm install

      - name: Bundle site files from Vercel into www/
        run: |
          set -e
          mkdir -p www/assets

          # Download app HTML → saved as app.html (index.html is our splash)
          curl -sL https://mp3king.vercel.app/ -o www/app.html
          echo "app.html: $(wc -c < www/app.html) bytes"

          # Parse JS/CSS asset paths referenced in the HTML
          ASSETS=$(grep -oE 'src="(/assets/[^"]+)"|href="(/assets/[^"]+)"' www/app.html \
            | grep -oE '/assets/[^"]+')
          echo "Assets to download: $ASSETS"

          for ASSET in $ASSETS; do
            FILENAME=$(basename "$ASSET")
            curl -sL "https://mp3king.vercel.app${ASSET}" -o "www/assets/${FILENAME}"
            echo "  $FILENAME: $(wc -c < "www/assets/${FILENAME}") bytes"
          done

          # Static extras
          curl -sL https://mp3king.vercel.app/manifest.json  -o www/manifest.json  || true
          curl -sL https://mp3king.vercel.app/placeholder.svg -o www/placeholder.svg || true
          curl -sL https://mp3king.vercel.app/logo.jpeg       -o www/logo.jpeg      || true

          # Rewrite asset paths: /assets/foo.js → assets/foo.js (relative, no leading /)
          sed -i 's|="/assets/|="assets/|g' www/app.html

          echo "--- www/ ---"
          ls -lh www/ www/assets/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode google-services.json (if present)
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mp3king-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
