<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MP3King</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #0a0a0a; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, #161616 0%, #0a0a0a 65%); }
  .ring-wrap { position: relative; width: 140px; height: 140px;
    display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
  .ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent;
    border-top-color: #f5c518; border-right-color: #f5c51855; animation: spin 1.1s linear infinite; }
  .ring.delay { inset: 12px; border-top-color: #f5c51899;
    animation-duration: 1.6s; animation-direction: reverse; }
  .logo { width: 86px; height: 86px; border-radius: 22px; object-fit: cover;
    box-shadow: 0 0 24px rgba(245,197,24,0.35); animation: pulse 1.8s ease-in-out infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
  .title { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; color: #f5c518;
    text-shadow: 0 0 18px rgba(245,197,24,0.3); margin-bottom: 6px;
    opacity: 0; animation: fadeIn 0.6s ease forwards 0.2s; }
  .subtitle { font-size: 13px; color: #777; letter-spacing: 0.3px;
    opacity: 0; animation: fadeIn 0.6s ease forwards 0.45s; }
  @keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>
  <div class="ring-wrap">
    <div class="ring"></div>
    <div class="ring delay"></div>
    <img class="logo" src="assets/logo.png" alt="MP3King">
  </div>
  <div class="title">MP3King</div>
  <div class="subtitle" id="sub">Loading&hellip;</div>
  <script>
    // This file is the splash — the real app HTML is fetched and injected
    // at build time by the GitHub Action into www/app.html (renamed from the
    // Vercel index.html). We just show the loader while the WebView parses it.
    // Capacitor serves www/ locally so no network needed for the shell.
    setTimeout(function() {
      window.location.replace('app.html');
    }, 800);
  </script>
</body>
</html>
